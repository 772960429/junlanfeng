# .github/workflows/build-site.yml
name: Build Site

on:
  # ✅ 当 fetch_data.yml 完成时触发
  workflow_run:
    workflows: ["Update News and Build Site"]  # 你的 fetch_data.yml 的 name
    types:
      - completed
  
  # ✅ 模板变化时触发
  push:
    paths:
      - 'data/issues.json'
      - 'index.html'
      - 'build_html.py'
      - '.github/workflows/build-site.yml'
  
  # 手动触发
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
# ✅ 核心条件：
    # 1. data/issues.json 变化 → 总是构建（不管谁提交）
    # 2. 用户提交 index.html → 构建
    # 3. bot 提交 index.html → 跳过
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && 
       (
         contains(github.event.head_commit.modified, 'data/issues.json') ||
         contains(github.event.head_commit.modified, 'build_html.py') ||
         contains(github.event.head_commit.modified, '.github/workflows/build-site.yml') ||
         (contains(github.event.head_commit.modified, 'index.html') && github.actor != 'github-actions[bot]')
       ))
    permissions:
      contents: write  # 允许提交代码
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Build HTML
        run: |
          echo "🏗️ 开始构建 HTML..."
          python build_html.py
      
      - name: Check if HTML changed
        id: check_changes
        run: |
          git add index.html
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "✅ HTML 未变化"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "📝 HTML 有变化，准备提交"
          fi
      
      - name: Commit and push HTML
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git commit -m "🏗️ Build site: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          git push
          echo "✅ HTML 已提交"
