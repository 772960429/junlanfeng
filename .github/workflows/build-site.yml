# .github/workflows/build-site.yml
name: Build Site

on:
  # 当 issues.json 被更新时触发（包括工作流1提交的）
  push:
    paths:
      - 'data/issues.json'
      - 'data/data.json'
      - 'index.html'  # 模板更新时也触发
      - 'scripts/build_html.py'
      - '.github/workflows/build-site.yml'
  
  # 手动触发
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # 跳过 bot 提交 + 只在 main 分支运行
    if: github.actor != 'github-actions[bot]' && github.ref == 'refs/heads/main'
    permissions:
      contents: write  # 允许提交代码
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Build HTML
        run: |
          echo "🏗️ 开始构建 HTML..."
          python build_html.py
      
      - name: Check if HTML changed
        id: check_changes
        run: |
          git add index.html
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "✅ HTML 未变化"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "📝 HTML 有变化，准备提交"
          fi
      
      - name: Commit and push HTML
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git commit -m "🏗️ Build site: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          git push
          echo "✅ HTML 已提交"
