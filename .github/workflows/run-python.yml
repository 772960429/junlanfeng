# .github/workflows/run-python.yml
name: Run Python Script

# 触发条件：你可以根据需要修改
on:
  # 1. 每当 main 分支有 push 时触发（可用于调试）
  push:
    branches: [ "main" ]
  # 2. 定时触发（每天 UTC 0:00，即北京时间 8:00）
  schedule:
    - cron: '0 0 * * *'
  # 3. 允许你从 GitHub 网页上手动点击运行
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest  # 使用 Ubuntu 环境

    steps:
      # 步骤1：检出代码，让工作流能访问到你的脚本
      - name: Checkout repository
        uses: actions/checkout@v4

      # 步骤2：设置 Python 版本
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'   # 你可以换成 3.10, 3.12 等

      # 步骤3：安装依赖（如果你的脚本有 requirements.txt）
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
      # 步骤4：真正运行你的 Python 脚本
      - name: Run Python script
        run: python fetch_data.py
        env:
          token: ${{ secrets.TOKEN }}
          cookie: ${{ secrets.COOKIE }}
      # # 步骤5：上传文件 
      # - name: Upload JSON artifact
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: issues-data
      #     path: issues.json
      # 步骤5：提交文件
      - name: Commit and push changes
        uses: step-security/git-auto-commit-action@v5
        with:
          commit_message: "Automated data update" # 自定义提交信息
          file_pattern: "issues.json" # 指定要提交的文件，如果要提交所有更改，可以设为 "."
